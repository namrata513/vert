<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verte — Join the Connection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-md border border-stone-200">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-emerald-700 tracking-tight">verte.</h1>
            <p id="auth-subtitle" class="text-stone-500 text-sm mt-1">Welcome back! Log in to check your vine streak.</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">Username</label>
                <input type="text" id="login-username" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 focus:outline-none focus:border-emerald-500 transition-all" placeholder="e.g., EcoClamber">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">Password</label>
                <input type="password" id="login-password" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 focus:outline-none focus:border-emerald-500 transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-md transition-all transform active:scale-95 text-lg mt-2">
                Sign In
            </button>
            <p class="text-center text-sm text-stone-500 mt-4">
                New to Verte? 
                <button type="button" id="to-register" class="text-emerald-600 font-bold hover:underline ml-1">Create an account</button>
            </p>
        </form>

        <form id="register-form" class="space-y-5 hidden">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">Choose Username</label>
                <input type="text" id="register-username" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 focus:outline-none focus:border-emerald-500 transition-all" placeholder="Pick something unique">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">Password</label>
                <input type="password" id="register-password" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 focus:outline-none focus:border-emerald-500 transition-all" placeholder="Minimum 6 characters">
            </div>
            <button type="submit" class="w-full bg-stone-800 hover:bg-stone-900 text-white font-bold py-4 rounded-xl shadow-md transition-all transform active:scale-95 text-lg mt-2">
                Register Account
            </button>
            <p class="text-center text-sm text-stone-500 mt-4">
                Already have an account? 
                <button type="button" id="to-login" class="text-emerald-600 font-bold hover:underline ml-1">Log in here</button>
            </p>
        </form>

    </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authSubtitle = document.getElementById('auth-subtitle');
    
    const API_BASE = "https://vert-7iyy.onrender.com";

    // Toggle View Event Listeners (Kept exactly the same)
    document.getElementById('to-register').addEventListener('click', () => {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        authSubtitle.innerText = "Register now to begin growing your sustainability vine.";
    });

    document.getElementById('to-login').addEventListener('click', () => {
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        authSubtitle.innerText = "Welcome back! Log in to check your vine streak.";
    });

    // 1. Handle REAL Registration Form Submission
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const usernameInput = document.getElementById('register-username').value;
        const passwordInput = document.getElementById('register-password').value;

        try {
            const response = await fetch(`${API_BASE}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            });
            const data = await response.json();

            if (response.ok) {
                // Save the user ID into browser storage so index.html knows who is playing
                localStorage.setItem("verte_user_id", data.user_id);
                alert("Account registered successfully! Redirecting to camera...");
                window.location.href = 'index.html';
            } else {
                alert(`Registration Error: ${data.error}`);
            }
        } catch (err) {
            console.error("DEBUG REGISTER ERROR:", err);
            alert(`System Error message: ${err.message}`);
        }
    });

    // 2. Handle REAL Login Form Submission
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const usernameInput = document.getElementById('login-username').value;
        const passwordInput = document.getElementById('login-password').value;

        try {
            const response = await fetch(`${API_BASE}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            });
            const data = await response.json();

            if (response.ok) {
                // Save authenticated user profile ID session token reference
                localStorage.setItem("verte_user_id", data.user_id);
                window.location.href = 'index.html';
            } else {
                alert(`Authentication Error: ${data.error}`);
            }
        } catch (err) {
            console.error("DEBUG LOGIN ERROR:", err);
            alert(`System Error message: ${err.message}`);
        }
    });
</script>
</body>
</html>
